<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>粤味厨房 Cooking Bananas - Playable Prototype</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="menu" class="menu-screen" aria-label="粤味厨房主菜单：点击画面中的开始游戏、规则说明或卡牌图鉴按钮">
  <div class="menu-inner">
    <div class="hero">
      <h1>粤味厨房</h1><h3>COOKING BANANAS</h3>
      <p><b>欢迎来到粤味厨房：用食材组合菜谱，在回合制对局中完成粤菜。</b><br>抢食材、管冰箱、做菜谱、用道具改变节奏。先把星星冲到 12★，成为今晚的星级主厨。</p>
      
    </div>
    <div class="menu-buttons">
      <button onclick="startGame()">开始游戏 / START</button>
      <button onclick="showRules()">规则说明 / RULES</button>
      <button onclick="showGallery()">卡牌图鉴 / GALLERY</button>
    </div>
  </div>
</div>
<div id="app"></div>
<div class="log"><div class="toast" id="toast">准备开始。</div></div>
<div id="modal" class="modal"><div class="modal-card" id="modalCard"></div></div>
<script src="js/game.js"></script>
</body>
</html>
